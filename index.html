<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<meta charset="utf-8">
<title>PS3LB</title>

<!-- 🚀 Preload الصور -->
<link rel="preload" as="image" href="2.png">
<link rel="preload" as="image" href="3.png">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* الصفحات */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
}

#home {
    display: block;
}

/* الخلفيات */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* الأزرار */
.btn {
    position: absolute;
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    cursor: pointer;
}

/* ===== الصفحة الرئيسية ===== */
#btn1 { top: 58%; left: 30%; font-size: 22px; padding: 10px 40px; }
#btn2 { top: 67%; left: 23%; font-size: 22px; padding: 10px 40px; }

/* ===== الصفحة 2 ===== */
#p2_b1 { top: 65%; left: 7%; font-size: 20px; padding: 10px 50px; }
#p2_b2 { top: 65%; left: 31%; font-size: 20px; padding: 10px 50px; }
#p2_b3 { top: 65%; left: 56%; font-size: 20px; padding: 10px 50px; }
#p2_b4 { top: 65%; left: 82%; font-size: 20px; padding: 10px 40px; }

#p2_back { top: 85%; left: 04%; font-size: 24px; padding: 10px 30px; }

/* ===== الصفحة 3 ===== */
#p3_b1 { top: 65%; left: 7%; font-size: 20px; padding: 10px 50px; }
#p3_b2 { top: 65%; left: 31%; font-size: 20px; padding: 10px 50px; }
#p3_b3 { top: 65%; left: 56%; font-size: 20px; padding: 10px 50px; }
#p3_b4 { top: 65%; left: 82%; font-size: 20px; padding: 10px 40px; }

#p3_back { top: 85%; left: 04%; font-size: 24px; padding: 10px 30px; }
</style>

<script>
// 🚀 تحميل الصور مسبقًا (مهم جدًا للـ PS3)
function preloadImages() {
    var img1 = new Image();
    var img2 = new Image();

    img1.src = "2.png";
    img2.src = "3.png";
}

// 🎮 التنقل السريع
function showPage(page) {
    document.getElementById("home").style.display = "none";
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "none";

    document.getElementById(page).style.display = "block";
}

window.onload = preloadImages;
</script>

</head>

<body>

<!-- الصفحة الرئيسية -->
<div id="home" class="page">
    <img src="1.png" class="bg">

    <button id="btn1" class="btn" onclick="showPage('page2')">Click Here</button>
    <button id="btn2" class="btn" onclick="showPage('page3')">Click Here</button>
</div>

<!-- الصفحة 2 -->
<div id="page2" class="page">
    <img src="2.png" class="bg">

    <button id="p2_b1" class="btn" onclick="window.location='https://www.mediafire.com/file/9c7sdnfyp7rj9q4/RELOAD_SERVER_GTA_V_1.27_BLES.pkg/file'">DOWNLOAD</button>
    <button id="p2_b2" class="btn" onclick="window.location='https://www.mediafire.com/file/beoeti3g863rx0z/RELOAD_SERVER_GTA_V_1.27_BLUS.pkg/file'">DOWNLOAD</button>
    <button id="p2_b3" class="btn" onclick="window.location='https://www.mediafire.com/file/yggh4qnuig83tou/RELOAD_SERVER_GTA_V_1.27_NPEB.pkg/file'">DOWNLOAD</button>
    <button id="p2_b4" class="btn" onclick="window.location='https://www.mediafire.com/file/aaq7xxtgzswvx7m/RELOAD_SERVER_GTA_V_1.27_NPUB.pkg/file'">DOWNLOAD</button>

    <button id="p2_back" class="btn" onclick="showPage('home')">Back</button>
</div>

<!-- الصفحة 3 -->
<div id="page3" class="page">
    <img src="3.png" class="bg">

    <button id="p3_b1" class="btn" onclick="window.location='https://www.mediafire.com/file/4ljkmmbv4wwrvwx/Mod+Menu+BLES.pkg/file'">DOWNLOAD</button>
    <button id="p3_b2" class="btn" onclick="window.location='https://www.mediafire.com/file/ub0cm7r1gxe3r4h/Mod+Menu+BLUS.pkg/file'">DOWNLOAD</button>
    <button id="p3_b3" class="btn" onclick="window.location='https://www.mediafire.com/file/dwp5ocuti3fetd1/Mod+Menu+NPEB.pkg/file'">DOWNLOAD</button>
    <button id="p3_b4" class="btn" onclick="window.location='https://www.mediafire.com/file/8eflit14gsgpmx0/Mod+Menu+NPUB.pkg/file'">DOWNLOAD</button>

    <button id="p3_back" class="btn" onclick="showPage('home')">Back</button>
</div>

</body>
</html>
